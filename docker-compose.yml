version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: synthetic_brain_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: changeme
      MONGO_INITDB_DATABASE: synthetic_brain
    ports:
      - "27017:27017"
    volumes:
      - synthetic_brain_mongo:/data/db

volumes:
  synthetic_brain_mongo:
